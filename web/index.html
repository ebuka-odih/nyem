
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Nyem - Tinder for Barter</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Swap. Match. Trade. The modern way to barter." />
    <meta name="theme-color" content="#880e4f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nyem" />
    
    <!-- iOS Safari PWA Support -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="72x72" href="/icon-72x72.png" />
    <link rel="apple-touch-icon" sizes="96x96" href="/icon-96x96.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icon-128x128.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="384x384" href="/icon-384x384.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512x512.png" />
    
    <!-- Android Chrome PWA Support -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512x512.png" />
    
    <!-- Favicon -->
    <link rel="shortcut icon" href="/favicon.ico" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                DEFAULT: '#880e4f', // Deep burgundy/wine color from screenshot
                light: '#ad1457',
                dark: '#560027',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* Safe area insets for iOS devices */
        --safe-area-inset-top: env(safe-area-inset-top, 0px);
        --safe-area-inset-right: env(safe-area-inset-right, 0px);
        --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
        --safe-area-inset-left: env(safe-area-inset-left, 0px);
      }

      * {
        /* Improve touch responsiveness */
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        background-color: #1a1a1a; /* Dark background for desktop framing */
        /* Prevent pull-to-refresh on mobile */
        overscroll-behavior-y: none;
        /* Prevent text selection on mobile for better UX */
        -webkit-user-select: none;
        user-select: none;
        /* Prevent zoom on double tap */
        touch-action: pan-x pan-y;
      }

      /* Allow text selection in input fields and text areas */
      input, textarea, [contenteditable] {
        -webkit-user-select: text;
        user-select: text;
      }

      /* Hide scrollbar for clean mobile look */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }

      /* Safe area bottom padding utility */
      .pb-safe-bottom {
        padding-bottom: calc(0.75rem + var(--safe-area-inset-bottom));
      }

      .safe-area-bottom {
        padding-bottom: var(--safe-area-inset-bottom);
      }

      .safe-area-container {
        padding-top: var(--safe-area-inset-top);
        padding-left: var(--safe-area-inset-left);
        padding-right: var(--safe-area-inset-right);
      }

      /* Touch-friendly button interactions */
      .touch-manipulation {
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }

      /* Prevent overscroll bounce on iOS */
      html, body {
        position: fixed;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      /* Smooth scrolling */
      * {
        scroll-behavior: smooth;
      }

      /* Better focus styles for accessibility */
      button:focus-visible,
      a:focus-visible {
        outline: 2px solid #880e4f;
        outline-offset: 2px;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
